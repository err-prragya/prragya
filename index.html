<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  
  <title>প্রজ্ঞা</title>
  
  
  <style>
      * {
      -webkit-tap-highlight-color: transparent;
    }
    * {
      transition: all 0.2s ease;
    }
    
    @font-face {
      font-family: 'nor';
      src: url('nor.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    
    @font-face {
      font-family: 'itl';
      src: url('itl.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background: #d4f000;
      font-family: "nor";
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    
    /* FULL SCREEN CONTAINER */
    .content {
      width: 100%;
      height: 100%;
      padding: 30px 30px 90px 30px;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    
    /* NAV */
    .nav {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 36px;
    }
    
    .sign-in {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #1a1a0a;
      text-decoration: none;
      border-bottom: 2px solid #1a1a0a;
      padding-bottom: 2px;
      opacity: 0.8;
    }
    
    /* TAGLINE */
    .tagline {
      font-size: 11px;
      letter-spacing: 1px;
      line-height: 1.2;
      color: #3a3a1a;
      text-transform: uppercase;
      opacity: 0.75;
    }
    
    .tagline strong {
      color: #1a1a0a;
      display: block;
      
    }
    
    /* HERO */
    .hero {
      font-size: 70px;
      line-height: 0.9;
      margin-top: auto;
      padding-top: 60px;
    }
    
    
    /* CTA */
    .cta-wrap {
      margin-top: 36px;
    }
    
    .cta-btn {
      font-family: "nor";
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 18px 24px;
      border: 2px solid #1a1a0a;
      border-radius: 50px;
      background: transparent;
      cursor: pointer;
    }
    
    .cta-btn:hover {
      background: #1a1a0a;
      color: #d4f000;
    }
    
    .btn-text {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      
    }
    
    .btn-arrow {
      font-size: 22px;
    }
  </style>
</head>

<body>
  
  <div class="content">
    
    <nav class="nav">
      <a href="#" class="sign-in">লগ ইন</a>
    </nav>
    
    
    <div class="tagline">
      লক্ষ্য যখন অনেক দূর,
      <strong>শিক্ষার আলোয় ফুটুক সুর।</strong>
      <br>
      অন্ধকারের বক্ষ চিরে,
      <strong>নতুন সকাল আসুক ফিরে।</strong>
    </div>
    
    <div class="hero">
      প্রজ্ঞায় <br> স্বাগতম
    </div>
    
    
    
    
    
    <div class="cta-wrap" onclick="window.location.href='oporichita.html'">
      <button class="cta-btn">
        <span class="btn-text">অপরিচিতা পড়ো</span>
        <span class="btn-arrow">➤</span>
      </button>
    </div>
    
  </div>
  
  
  <script type="text/javascript" charset="utf-8">
    
  </script>
</body>

</html>
